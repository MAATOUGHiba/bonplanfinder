name: restaurant_finder
description: "BonPlanFinder mobile application."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.5+1
  sqflite: ^2.4.2
  path: ^1.9.1
  shared_preferences: ^2.5.3
  crypto: ^3.0.6
  http: ^1.5.0
  geolocator: ^14.0.2
  intl: ^0.20.2
  image_picker: ^1.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  # Brand assets live at the project root assets folder.
  assets:
    - assets/images/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/BonPlanFinder.png"
